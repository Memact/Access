services:
  - type: web
    name: memact-access
    runtime: node
    branch: main
    autoDeployTrigger: commit
    buildCommand: npm ci
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MEMACT_ACCESS_HOST
        value: 0.0.0.0
      - key: MEMACT_ACCESS_STORE
        value: .data/access-store.json
      - key: MEMACT_ACCESS_ALLOWED_ORIGINS
        value: https://www.memact.com,https://memact.com,https://memact-website.onrender.com
